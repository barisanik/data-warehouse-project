# ============================================================
#  .github/workflows/ci.yml
#
#  Purpose: CI pipeline for the data-warehouse-project.
#
#  Jobs:
#    1. python-tests:   Runs unit tests (mocked, no DB required).
#    2. dbt-parse:      Validates dbt project structure without a DB connection.
#    3. pipeline:       Nightly full run: ingestion → bronze load → dbt Cloud trigger
#
#  Trigger conditions:
#    - push / pull_request: runs jobs 1 and 2 only.
#    - schedule (nightly):  runs job 3 only.
#
#  Required GitHub Secrets:
#    DBT_CI_PASSWORD:   Any non-empty string. Satisfies env_var() in profiles.yml.
#    GCP_SA_KEY:        Full contents of dwh-sa-key.json (GCP service account).
#    GCP_PROJECT_ID:    GCP project ID string.
#    DBT_API_TOKEN:     dbt Cloud personal API token. (Can be created via Account Settings -> API Tokens -> Personal tokens)
#
# ============================================================

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'   # Every night at 03:00 UTC


jobs:

  # ── Job 1:   Python Unit Tests   ──────────────────────────────────────────────────
  # Runs mocked unit tests. No database connection required.
  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_get_data.py \
            tests/test_simulate_ship_date.py \
            tests/test_load_bronze_csv_data.py \
            -v --tb=short


  # ── Job 2:   dbt Parse Check   ────────────────────────────────────────────────────
  # Validates dbt project structure without a live BigQuery connection.
  dbt-parse:
    name: dbt Parse Check
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery==1.11.3

      # Creates a dummy profiles.yml inside dwh_dbt_files/ for CI.
      # dbt parse does not open a BigQuery connection, so dummy values are sufficient.
      - name: Create dbt profiles.yml
        run: |
          cat > dwh_dbt_files/profiles.yml << 'EOF'
          dwh_dbt_files:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: ci-dummy-project
                dataset: silver
                keyfile: /dev/null
                location: EU
                threads: 4
          EOF

      - name: Install dbt packages
        working-directory: dwh_dbt_files
        run: dbt deps --profiles-dir .

      - name: Parse dbt project
        working-directory: dwh_dbt_files
        run: dbt parse --profiles-dir .


  # ── Job 3:   Trigger dbt Cloud job   ───────────────────────────────────────────────────
  # Full run: fetches API data -> loads CSVs to bronze -> triggers dbt Cloud job.
  # Only runs on the nightly schedule, not on push or pull_request.
  pipeline:
    name: Trigger dbt Cloud job
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run get_data.py
        run: python scripts/bronze/get_data.py
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: Run load_bronze_csv_data.py
        run: python scripts/bronze/load_bronze_csv_data.py
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          DATASETS_DIR: datasets

      - name: Trigger dbt Cloud job
        run: |
          curl -X POST \
            --fail \
            -H "Authorization: Token ${{ secrets.DBT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"cause": "Triggered by GitHub Actions nightly pipeline"}' \
            https://cloud.getdbt.com/api/v2/accounts/${{ secrets.DBT_ACCOUNT_ID }}/jobs/${{ secrets.DBT_JOB_ID }}/run/