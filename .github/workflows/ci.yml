# ============================================================
#  .github/workflows/ci.yml
#
#  Purpose: CI pipeline for the data-warehouse-project.
#
#  Jobs:
#    1. python-tests:   Runs unit tests (mocked, no DB required).
#    2. dbt-parse:      Validates dbt project structure without a DB connection.
#    3. pipeline:       Nightly full run: ingestion → bronze load → dbt Cloud trigger
#                       → poll for completion → parse DQ test results → load to BigQuery
#
#  Trigger conditions:
#    - push / pull_request:            runs jobs 1 and 2 only.
#    - schedule (nightly) / manual dispatch: runs job 3 only (full data refresh + dbt Cloud trigger).
#
#  Required GitHub Secrets:
#    DBT_CI_PASSWORD:   Any non-empty string. Satisfies env_var() in profiles.yml.
#    GCP_SA_KEY:        Full contents of dwh-sa-key.json (GCP service account).
#    GCP_PROJECT_ID:    GCP project ID string.
#    DBT_API_TOKEN:     dbt Cloud personal API token. (Can be created via Account Settings -> API Tokens -> Personal tokens)
#    DBT_ACCESS_URL:    Account-specific API host, e.g. "abc123.us1.dbt.com". Please find it in dbt Cloud > Account Settings > Access URLs.
#    DBT_ACCOUNT_ID:    dbt Cloud account ID.
#    DBT_JOB_ID:        dbt Cloud job ID.
#
# ============================================================

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'   # Every night at 03:00 UTC
  workflow_dispatch:        # Allows manual trigger of the full pipeline job from the Actions tab / API / gh CLI


jobs:

  # ── Job 1:   Python Unit Tests   ──────────────────────────────────────────────────
  # Runs mocked unit tests. No database connection required.
  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_get_data.py \
            tests/test_simulate_ship_date.py \
            tests/test_load_bronze_csv_data.py \
            tests/test_dq_metrics_common.py \
            -v --tb=short


  # ── Job 2:   dbt Parse Check   ────────────────────────────────────────────────────
  # Validates dbt project structure without a live BigQuery connection.
  dbt-parse:
    name: dbt Parse Check
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery==1.11.3

      # Creates a dummy profiles.yml inside dwh_dbt_files/ for CI.
      # dbt parse does not open a BigQuery connection, so dummy values are sufficient.
      - name: Create dbt profiles.yml
        run: |
          cat > dwh_dbt_files/profiles.yml << 'EOF'
          dwh_dbt_files:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: ci-dummy-project
                dataset: silver
                keyfile: /dev/null
                location: EU
                threads: 4
          EOF

      - name: Install dbt packages
        working-directory: dwh_dbt_files
        run: dbt deps --profiles-dir .

      - name: Parse dbt project
        working-directory: dwh_dbt_files
        run: dbt parse --profiles-dir .


  # ── Job 3:   Trigger dbt Cloud job + load DQ metrics   ─────────────────────────────
  # Full run: fetches API data -> loads CSVs to bronze -> triggers dbt Cloud job
  # -> waits for completion -> parses test artifacts -> appends to dq.dq_test_log.
  # Only runs on the nightly schedule or manual dispatch, not on push or pull_request.
  pipeline:
    name: Trigger dbt Cloud job
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run get_data.py
        run: python scripts/bronze/get_data.py
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: Run load_bronze_csv_data.py
        run: python scripts/bronze/load_bronze_csv_data.py
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          DATASETS_DIR: datasets

      - name: Run simulate_ship_date.py
        run: python scripts/bronze/simulate_ship_date.py
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: Trigger dbt Cloud job
        id: trigger_dbt
        env:
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
          DBT_ACCOUNT_ID: ${{ secrets.DBT_ACCOUNT_ID }}
          DBT_JOB_ID: ${{ secrets.DBT_JOB_ID }}
          DBT_ACCESS_URL: ${{ secrets.DBT_ACCESS_URL }}
        run: |
          HTTP_CODE=$(curl -X POST \
            -s -o response.json -w "%{http_code}" \
            -H "Authorization: Token $DBT_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"cause": "Triggered by GitHub Actions nightly pipeline"}' \
            "https://${DBT_ACCESS_URL}/api/v2/accounts/$DBT_ACCOUNT_ID/jobs/$DBT_JOB_ID/run/")

          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          cat response.json

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::dbt Cloud job trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi

          # Extract the run id from the trigger response so later steps can poll it.
          RUN_ID=$(jq -r '.data.id' response.json)
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Triggered dbt Cloud run: $RUN_ID"

      - name: Poll dbt Cloud run until completion
        id: poll_dbt
        env:
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
          DBT_ACCOUNT_ID: ${{ secrets.DBT_ACCOUNT_ID }}
          DBT_ACCESS_URL: ${{ secrets.DBT_ACCESS_URL }}
          RUN_ID: ${{ steps.trigger_dbt.outputs.run_id }}
        run: |
          # dbt Cloud run status codes: 1=Queued, 2=Starting, 3=Running,
          # 10=Success, 20=Error, 30=Cancelled.
          for i in $(seq 1 60); do
            RESPONSE=$(curl -s \
              -H "Authorization: Token $DBT_API_TOKEN" \
              "https://${DBT_ACCESS_URL}/api/v2/accounts/$DBT_ACCOUNT_ID/runs/$RUN_ID/")

            STATUS=$(echo "$RESPONSE" | jq -r '.data.status')
            echo "Poll $i: status=$STATUS"

            if [ "$STATUS" == "10" ]; then
              STARTED_AT=$(echo "$RESPONSE" | jq -r '.data.started_at')
              FINISHED_AT=$(echo "$RESPONSE" | jq -r '.data.finished_at')
              echo "started_at=$STARTED_AT" >> "$GITHUB_OUTPUT"
              echo "finished_at=$FINISHED_AT" >> "$GITHUB_OUTPUT"
              echo "dbt Cloud run succeeded."
              exit 0
            elif [ "$STATUS" == "20" ] || [ "$STATUS" == "30" ]; then
              echo "::error::dbt Cloud run finished with status $STATUS"
              exit 1
            fi

            sleep 30
          done

          echo "::error::Timed out waiting for dbt Cloud run to finish."
          exit 1

      - name: Download dbt artifacts
        env:
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
          DBT_ACCOUNT_ID: ${{ secrets.DBT_ACCOUNT_ID }}
          DBT_ACCESS_URL: ${{ secrets.DBT_ACCESS_URL }}
          RUN_ID: ${{ steps.trigger_dbt.outputs.run_id }}
        run: |
          BASE_URL="https://${DBT_ACCESS_URL}/api/v2/accounts/$DBT_ACCOUNT_ID/runs/$RUN_ID/artifacts"
          curl -s -H "Authorization: Token $DBT_API_TOKEN" "$BASE_URL/manifest.json" -o scripts/data_quality/manifest.json
          curl -s -H "Authorization: Token $DBT_API_TOKEN" "$BASE_URL/run_results.json" -o scripts/data_quality/run_results.json

      - name: Load DQ metrics to BigQuery
        working-directory: scripts/data_quality
        run: python load_dq_metrics.py
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          DBT_RUN_ID: ${{ steps.trigger_dbt.outputs.run_id }}
          DBT_RUN_STARTED_AT: ${{ steps.poll_dbt.outputs.started_at }}
          DBT_RUN_FINISHED_AT: ${{ steps.poll_dbt.outputs.finished_at }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}