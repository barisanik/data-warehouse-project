# ============================================================
#  .github/workflows/ci.yml
#
#  Purpose: CI pipeline for the data-warehouse-project.
#
#  Jobs:
#    1. python-tests:   Runs unit tests (mocked, no DB required)
#    2. dbt-parse:      Validates dbt project structure without a DB connecti
#
#  Trigger conditions:
#    - Push to main or develop branches.
#    - Pull request targeting main branch.
#
#  Required GitHub Secret:
#    DBT_CI_PASSWORD:   Any non-empty string. dbt compile does not open a DB connection;
#                       This secret only satisfies the env_var() call in profiles.yml which has no default value.
#                       Set it under: Repository -> Settings -> Secrets -> Actions.
#
#  Out of scope (deferred until cloud migration):
#    - dbt run / dbt test — requires a live SQL Server instance.
#                       
# ============================================================

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:

  # ── Job 1: Python Unit Tests ──────────────────────────────── ''''
  # Runs mocked unit tests for get_data.py and simulate_ship_date.py.
  # No database connection is required. All external calls are patched with unittest.mock in the test files.
  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_get_data.py \
            tests/test_simulate_ship_date.py \
            -v --tb=short


  # ── Job 2: dbt Parse Check ────────────────────────────────
  # Installs dbt-bigquery and parses all models and macros. dbt parse renders every Jinja template and validates model/source references.
  # No live BigQuery connection is needed — a dummy profiles.yml is created inline.
  dbt-parse:
    name: dbt Parse Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery==1.11.3

      # Creates a dummy profiles.yml inside dwh_dbt_files/ for CI.
      # dbt parse does not open a BigQuery connection, so dummy values are sufficient.
      - name: Create dbt profiles.yml
        run: |
          cat > dwh_dbt_files/profiles.yml << 'EOF'
          dwh_dbt_files:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: ci-dummy-project
                dataset: silver
                keyfile: /dev/null
                location: EU
                threads: 4
          EOF

      - name: Install dbt packages
        working-directory: dwh_dbt_files
        run: dbt deps --profiles-dir .

      - name: Parse dbt project
        working-directory: dwh_dbt_files
        run: dbt parse --profiles-dir .