# ============================================================
#  docker-compose.yml
#  Purpose: Orchestrates the full data warehouse pipeline.
#
#  Run order: Sqlserver → Sqlserver-setup → corruption  → ingestion → dbt → Airflow Services → Metabase
#
#  Usage:
#    docker compose up          # run full pipeline
#    docker compose up dbt      # run only dbt (assumes DB is ready)
#    docker compose down -v     # stop and delete all data
# ============================================================

services:

  # ── 1. SQL Server ─────────────────────────────────────────
  # The database engine. Starts first, other services wait for it.
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_USERNAME: ${SA_USERNAME}
      SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1435:1433"                                      # Expose to host for tools like SSMS/DBeaver
    volumes:
      - sqlserver_data:/var/opt/mssql                    # Persist database files between restarts
      - ./datasets:/var/opt/mssql/datasets:ro            # Mount CSV files for BULK INSERT (read-only)
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U \"$SA_USERNAME\" -P \"$SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s                                  # Give SQL Server time to boot before first check

  # ── 2. Database init ───────────────────────────────────────
  # Runs SQL scripts once: creates DB, schemas, UDFs, bronze tables, loads CSVs.
  # Uses the same SQL Server image.
  sqlserver-setup:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts                               # Mount scripts folder
    environment:
      SA_USERNAME: ${SA_USERNAME}
      SA_PASSWORD: ${SA_PASSWORD}
    command: /bin/bash /scripts/init/setup_db.sh
    restart: on-failure                                  # Retry if SQL Server isn't fully ready yet

  # ── 3. Sales Ship Date Simulation ───────────────────────────
  # Delays sls_ship_dt of bronze.crm_sales_details.
  simulation:
    build:
      context: .
      dockerfile: docker/Dockerfile.simulation
    env_file: .env
    depends_on:
      sqlserver-setup:
        condition: service_completed_successfully

  # ── 4. API ingestion ───────────────────────────────────────
  # Fetches DummyJSON data and loads it into bronze API tables.
  ingestion:
    build:
      context: .
      dockerfile: docker/Dockerfile.ingestion
    env_file: .env
    depends_on:
      sqlserver-setup:
        condition: service_completed_successfully

  # ── 5. dbt ────────────────────────────────────────────────
  # Runs Silver and Gold dbt models, then all tests.
  dbt:
    build:
      context: .
      dockerfile: docker/Dockerfile.dbt
    env_file: .env
    depends_on:
      ingestion:
        condition: service_completed_successfully
      simulation:
        condition: service_completed_successfully

# ── 6. Airflow Metadata DB ────────────────────────────────
  # Stores Airflow state: DAG runs, task results, logs.
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

# ── 7. Airflow Init ───────────────────────────────────────
  # Runs once: migrates Airflow DB and creates admin user, then exits.
  airflow-init:
    image: apache/airflow:2.9.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: bash -c "airflow db migrate && airflow users create --username $${AIRFLOW_ADMIN_USERNAME} --password $${AIRFLOW_ADMIN_PASSWORD} --firstname Admin --lastname User --role Admin --email $${AIRFLOW_ADMIN_EMAIL}"
    env_file: .env

  # ── 8. Airflow Webserver ──────────────────────────────────
  # Serves the Airflow UI at localhost:8080.
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    command: airflow webserver
    env_file: .env

  # ── 9. Airflow Scheduler ─────────────────────────────────
  # Monitors DAGs and triggers tasks when conditions are met.
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: airflow scheduler
    env_file: .env

  # ── 10. Metabase ──────────────────────────────────────────
  # BI and dashboarding tool. Connects to SQL Server gold layer.
  # UI available at localhost:3000 after startup (~60-90 seconds).
  metabase:
    image: metabase/metabase:latest
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db

volumes:
  sqlserver_data:
  postgres_data:
  airflow_logs:
  metabase_data:
