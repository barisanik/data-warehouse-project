version: 2

models:
  - name: stg_crm__cust_info
    description: "Deduplicated and cleaned CRM customer records."
    columns:
      - name: cst_id
        tests:
          - not_null
          - unique
      - name: cst_firstname
        tests:
          - not_null
          - no_whitespace
      - name: cst_lastname
        tests:
          - not_null
          - no_whitespace
      - name: cst_marital_status
        tests:
          - accepted_values:
              config:
                severity: error
              arguments:
                values: ['Single', 'Married', 'n/a']
      - name: cst_gndr
        tests:
          - accepted_values:
              config:
                severity: error
              arguments:
                values: ['Male', 'Female', 'n/a']
      - name: cst_create_date
        tests:
          - not_null
      - name: dwh_create_date
        tests:
          - not_null
  - name: stg_crm__prd_info
    description: "Formatted CRM products records."
    columns:
      - name: prd_id
        tests:
          - not_null
          - unique
      - name: cat_id
        tests:
          - not_null
          - matches_pattern:
              arguments:
                pattern: '__[_]__'
      - name: prd_key
        tests:
          - not_null
          - no_whitespace
      - name: prd_nm
        tests:
          - not_null
          - no_whitespace
          - assert_case:
              arguments:
                case: 'initcap'
      - name: prd_cost
        tests:
          - not_null
      - name: prd_line
        tests:
          - accepted_values:
              config:
                severity: error
              arguments:
                values: ['Mountain', 'Road', 'Other Sales', 'Touring', 'n/a']
      - name: prd_start_dt
        tests:
          - not_null
          - assert_less_than:
              arguments:
                column_b: prd_end_dt
      - name: prd_end_dt
        tests:
          - not_null:
              config:
                severity: warn
      - name: dwh_create_date
        tests:
          - not_null
  - name: stg_crm__sales_details
    description: "Formatted CRM sales records."
    columns:
      - name: sls_ord_num
        tests:
          - not_null
          - no_whitespace
      - name: sls_prd_key
        tests:
          - not_null
          - no_whitespace
          - relationships:
              arguments:
                to: ref('stg_crm__prd_info')
                field: prd_key
      - name: sls_cust_id
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
          - relationships:
              arguments:
                to: ref('stg_crm__cust_info')
                field: cst_id
      - name: sls_order_dt
        tests:
          - not_null:
              config:
                severity: warn
          - dbt_utils.accepted_range:
              arguments:
                min_value: "'1900-01-01'"
                max_value: "GETDATE()"
                inclusive: true
      - name: sls_ship_dt
        tests:
          - not_null:
              config:
                severity: warn
          - dbt_utils.accepted_range:
              arguments:
                min_value: "'1900-01-01'"
                inclusive: true
      - name: sls_due_dt
        tests:
          - not_null:
              config:
                severity: warn
          - dbt_utils.accepted_range:
              arguments:
                min_value: "'1900-01-01'"
                inclusive: true
      - name: sls_sales
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: sls_quantity
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: sls_price
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: dwh_create_date
        tests:
          - not_null
  - name: stg_erp__loc_a101
    description: "Formatted ERP customer locations."
    columns:
      - name: cid
        tests:
          - not_null
          - unique
          - no_whitespace
          - not_contains_string:
              arguments:
                text: '-'
      - name: cntry
        tests:
          - accepted_values:
              config:
                severity: error
              arguments:
                values: ['United States', 'Germany', 'Australia', 'Canada', 'France', 'United Kingdom', 'n/a']
      - name: dwh_create_date
        tests:
          - not_null
  - name: stg_erp__cust_az12
    description: "Formatted ERP customer birthday and gender records."
    columns:
      - name: cid
        tests:
          - not_null
          - unique
          - no_whitespace
          - not_contains_string:
              arguments:
                text: 'NAS'
      - name: bdate
        tests:
          - not_null:
              config:
                severity: warn
          - dbt_utils.accepted_range:   # Checks if birthday is between 1900-01-01 AND 18 years ago.
              arguments:
                min_value: "'1900-01-01'"
                max_value: "DATEADD(YEAR, -18, GETDATE())"
                inclusive: true
      - name: gen
        tests:
          - accepted_values:
              config:
                severity: error
              arguments:
                values: ['Male', 'Female', 'n/a']
      - name: dwh_create_date
        tests:
          - not_null
  - name: stg_erp__px_cat_g1v2
    description: "Formatted ERP product category and maintenance records."
    columns:
      - name: id
        tests:
          - not_null
          - unique
          - matches_pattern:
              arguments:
                pattern: '__[_]__'
      - name: cat
        tests:
          - not_null
          - no_whitespace
      - name: subcat
        tests:
          - not_null
          - no_whitespace
      - name: maintenance
        tests:
          - accepted_values:
              config:
                severity: error
              arguments:
                values: ['Yes', 'No', 'n/a']
      - name: dwh_create_date
        tests:
          - not_null
  - name: stg_djapi__customer
    description: "Formatted API customer records."
    columns:
      - name: id
        tests:
          - not_null
          - unique
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: first_name
        tests:
          - not_null
          - no_whitespace
      - name: last_name
        tests:
          - not_null
          - no_whitespace
      - name: gender
        tests:
          - not_null
          - accepted_values:
              config:
                severity: error
              arguments:
                values: ['Male', 'Female', 'n/a']
          - no_whitespace
      - name: birthdate
        tests:
          - not_null:
              config:
                severity: warn
          - dbt_utils.accepted_range:   # Checks if birthday is between 1900-01-01 AND 18 years ago.
              arguments:
                min_value: "'1900-01-01'"
                max_value: "DATEADD(YEAR, -18, GETDATE())"
                inclusive: true
      - name: city
        tests:
          - not_null
          - no_whitespace
          - assert_case:
              arguments:
                case: 'initcap'
      - name: state
        tests:
          - not_null
          - no_whitespace
          - assert_case:
              arguments:
                case: 'initcap'
      - name: state_code
        tests:
          - not_null
          - no_whitespace
          - assert_case:
              arguments:
                case: 'upper'
      - name: country
        tests:
          - not_null
          - no_whitespace
          - assert_case:
              arguments:
                case: 'initcap'
      - name: dwh_create_date
        tests:
          - not_null
  - name: stg_djapi__product
    description: "Formatted API product records."
    columns:
      - name: id
        tests:
          - not_null
          - unique
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: title
        tests:
          - not_null
          - no_whitespace
          - assert_case:
              arguments:
                case: 'initcap'
          - unique:
              config:
                severity: warn
      - name: category
        tests:
          - not_null
          - no_whitespace
          - assert_case:
              arguments:
                case: 'initcap'
      - name: pkey
        tests:
          - not_null
          - no_whitespace
          - assert_length:
              arguments:
                  length_limit: 15
          - not_contains_string:
              arguments:
                text: '[_]'
  - name: stg_djapi__order
    description: "Formatted API order records."
    tests:
      - dbt_utils.unique_combination_of_columns:  # Checks order id - product id combination for each order record.
          arguments:
            combination_of_columns:
              - id
              - prd_id
            config:
              severity: warn
    columns:
      - name: id
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: cust_id
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
          - relationships:
              arguments:         
                to: ref('stg_djapi__customer')
                field: id
      - name: prd_id
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
          - relationships:  
              arguments:      
                to: ref('stg_djapi__product')
                field: id
      - name: unit_price
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: quantity
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true
      - name: total_price
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
          - assert_formula:
              arguments:
                column_a: 'unit_price'
                column_b: 'quantity'
                op: 'multiply'
      - name: dwh_create_date
        tests:
          - not_null